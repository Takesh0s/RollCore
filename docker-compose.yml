# ─────────────────────────────────────────────────────────────────────────────
# RollCore – local development stack
# Arquitetura §7 (Visão de Implantação) / Docker + Docker Compose
#
# Usage:
#   docker compose up -d          # start all services
#   docker compose logs -f api    # follow API logs
#   docker compose down -v        # stop and remove volumes
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL 16 ───────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: rollcore-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: rollcore
      POSTGRES_USER: rollcore
      POSTGRES_PASSWORD: rollcore
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rollcore -d rollcore"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Spring Boot API ─────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rollcore-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/rollcore
      SPRING_DATASOURCE_USERNAME: rollcore
      SPRING_DATASOURCE_PASSWORD: rollcore

      JWT_SECRET: local-dev-secret-change-before-deploy-must-be-256-bits-long!!
      PORT: 8080
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000
      SPRING_PROFILES_ACTIVE: default
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

volumes:
  postgres_data: