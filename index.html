<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RPG Skill Checker</title>

  <link rel="stylesheet" href="./frontend/styles/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>

<div class="proto-shell">

  <div class="screen-nav">
    <button class="nav-btn active" data-nav="login">Login</button>
    <button class="nav-btn" data-nav="cadastro">Cadastro</button>
    <button class="nav-btn" data-nav="dashboard">Dashboard</button>
    <button class="nav-btn" data-nav="ficha">Ficha</button>
    <button class="nav-btn" data-nav="dados">Dados</button>
  </div>

  <div class="screen active" id="s-login">
    <div class="device login-device">

      <div class="login-header">
        <div class="logo-box">🎲</div>
        <h1>RPG Skill Checker</h1>
        <p>Acesse sua conta</p>
      </div>

      <div class="page-body narrow">

        <div class="form-group">
          <label>E-mail</label>
          <input class="form-input" id="email">
          <small class="error-msg" id="login-email-error"></small>
        </div>

        <div class="form-group">
          <label>Senha</label>
          <input type="password" class="form-input" id="password">
          <small class="error-msg" id="login-pass-error"></small>
        </div>

        <div class="form-group">
          <label>
            <input type="checkbox" id="remember">
            Manter conectado
          </label>
        </div>

        <button class="btn-primary" id="login-btn">Entrar</button>

        <p class="link" data-nav="cadastro">Criar conta</p>

      </div>
    </div>
  </div>

  <div class="screen" id="s-cadastro">
    <div class="device login-device">

      <div class="login-header">
        <h1>Criar conta</h1>
      </div>

      <div class="page-body narrow">

        <div class="form-group">
          <label>E-mail</label>
          <input class="form-input" id="reg-email">
          <small class="error-msg" id="reg-email-error"></small>
        </div>

        <div class="form-group">
          <label>Senha</label>
          <input type="password" class="form-input" id="reg-pass">
          <small class="error-msg" id="reg-pass-error"></small>
        </div>

        <div class="form-group">
          <label>Confirmar Senha</label>
          <input type="password" class="form-input" id="reg-confirm">
          <small class="error-msg" id="reg-confirm-error"></small>
        </div>

        <button class="btn-primary" id="register-btn">Criar Conta</button>

        <p class="link" data-nav="login">Já tenho conta</p>

      </div>
    </div>
  </div>

  <div class="screen" id="s-dashboard">
    <div class="device">

      <div class="topbar">
        <div>
          <div class="top-title">RPG Skill Checker</div>
          <div class="top-sub">Bem-vindo, jogador</div>
        </div>
      </div>

      <div class="page-body">

        <h2 class="section-title">Acesso rápido</h2>

        <div class="cards-grid">

          <div class="dash-card" data-nav="ficha">
            <div class="card-icon">👤</div>
            <h3>Personagens</h3>
            <p>Gerenciar fichas</p>
          </div>

          <div class="dash-card" data-nav="dados">
            <div class="card-icon">🎲</div>
            <h3>Dados</h3>
            <p>Rolar dados</p>
          </div>

        </div>

      </div>
    </div>
  </div>

  <div class="screen" id="s-ficha">
    <div class="device">

      <div class="topbar">
        <button data-nav="dashboard">←</button>
        <div>
          <div class="top-title" id="char-name">Nome</div>
          <div class="top-sub" id="char-meta">Classe • Nível</div>
        </div>
      </div>

      <div class="page-body">

        <h2 class="section-title">Atributos</h2>

        <div class="attr-grid" id="attr-container">
        </div>

        <h2 class="section-title">Combate</h2>

        <div class="attr-grid">
          <div class="attr-box">
            <span>Proficiência</span>
            <strong id="prof-bonus">+0</strong>
          </div>
          <div class="attr-box">
            <span>HP</span>
            <strong id="hp">0</strong>
          </div>
          <div class="attr-box">
            <span>CA</span>
            <strong id="ac">0</strong>
          </div>
        </div>

      </div>
    </div>
  </div>

  <div class="screen" id="s-dados">
    <div class="device">

      <div class="topbar">
        <button data-nav="dashboard">←</button>
        <div class="top-title">Rolagem de Dados</div>
      </div>

      <div class="page-body">

        <div class="form-group">
          <label>Fórmula</label>
          <input class="form-input" id="formula" placeholder="Ex: 2d6+3">
        </div>

        <button class="btn-primary" id="roll-btn">Rolar</button>

        <div class="dice-area">
          <h2 id="result">0</h2>
          <p id="result-break"></p>
        </div>

        <div class="dice-buttons">
          <button data-roll="4">d4</button>
          <button data-roll="6">d6</button>
          <button data-roll="8">d8</button>
          <button data-roll="10">d10</button>
          <button data-roll="12">d12</button>
          <button class="highlight" data-roll="20">d20</button>
          <button data-roll="100">d100</button>
        </div>

        <h3 class="section-title">Histórico</h3>
        <div id="history"></div>

      </div>
    </div>
  </div>

</div>

<script type="module" src="./frontend/core/app.js"></script>

</body>
</html>
