spring:
  application:
    name: rollcore-backend

  # ── DataSource (PostgreSQL 16) ──────────────────────────────────────────
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/rollcore}
    username: ${SPRING_DATASOURCE_USERNAME:rollcore}
    password: ${SPRING_DATASOURCE_PASSWORD:rollcore}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      pool-name: RollCoreHikari

  # ── JPA / Hibernate ─────────────────────────────────────────────────────
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC

  # ── Flyway ──────────────────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ── Jackson ─────────────────────────────────────────────────────────────
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

# ── Server ──────────────────────────────────────────────────────────────────
server:
  port: ${PORT:8080}
  compression:
    enabled: true
    mime-types: application/json
  error:
    include-message: never
    include-stacktrace: never
    include-binding-errors: never

# ── JWT (RNF-03 / UC-01 RN-02 / Arquitetura §3) ─────────────────────────────
jwt:
  secret: ${JWT_SECRET:CHANGE_THIS_TO_A_SECURE_256BIT_SECRET_KEY_IN_PRODUCTION!!}
  access-token-expiration-ms: 900000      # 15 minutes
  refresh-token-expiration-ms: 604800000  # 7 days

# ── Rate Limiting (RNF-03 / UC-01 RE-03) ────────────────────────────────────
rate-limit:
  requests-per-minute: ${RATE_LIMIT_RPM:60}

# ── CORS ────────────────────────────────────────────────────────────────────
cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:5173,https://rollcore.vercel.app}

# ── SpringDoc / Swagger UI (RNF-06) ─────────────────────────────────────────
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
    display-request-duration: true

# ── Actuator (RNF-02) ───────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
  info:
    env:
      enabled: true

info:
  app:
    name: RollCore Backend
    version: 0.1.0
    description: RPG Skill Checker & Companion — Fase 1 MVP